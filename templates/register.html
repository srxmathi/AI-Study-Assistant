<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container">

    <h1>Create Account</h1>
    {% if message %}
    <p style="color:rgb(200, 19, 19); font-weight:bold;">
        {{ message }}
    </p>
    {% endif %}

    <form method="POST">

        <input
        type="text"
        name="name"
        placeholder="Enter Name"
        required>

        <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

        <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
