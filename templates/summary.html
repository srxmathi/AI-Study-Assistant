<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, Helvetica, sans-serif;
        }

        .container{
            width:85%;
            max-width:1000px;
            margin:40px auto;
        }

        .header{
            text-align:center;
            margin-bottom:30px;
        }

        .header h1{
            color:#2c3e50;
            font-size:40px;
        }

        .filename{
            text-align:center;
            color:#555;
            margin-bottom:20px;
        }

        .card{
            background:white;
            border-radius:15px;
            padding:30px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.15);
        }

        pre{
            white-space:pre-wrap;
            font-size:17px;
            line-height:1.8;
            font-family:Arial;
        }

        .buttons{
            margin-top:30px;
            text-align:center;
        }

        button{
            padding:12px 25px;
            font-size:16px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            margin:10px;
            background:#0d6efd;
            color:white;
        }

        button:hover{
            background:#0b5ed7;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>🤖 AI Study Assistant</h1>
        <p>AI Generated Study Notes</p>
    </div>

    <div class="filename">
        <h2>{{ filename }}</h2>
    </div>

    <div class="card">

<pre>
{{ summary }}
</pre>

    </div>

    <div class="buttons">

        <a href="/upload">
            <button>📄 Upload Another PDF</button>
        </a>
        
        <a href="/chat">
            <button>💬 Chat with Notes</button>
        </a>
        
        <a href="/dashboard">
            <button>🏠 Dashboard</button>
        </a>

    </div>

</div>

</body>
</html>
