<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <div class="logo">📚 AI Study Assistant</div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="dashboard">

    <h1>👋 Welcome, {{ name }}</h1>

    <p>Select a feature below.</p>

    <div class="cards">

        <div class="card">
            <h2>📄 Upload Notes</h2>
            <p>Upload PDF notes for AI analysis.</p>
            <a href="/upload">
                <button>Open</button>
            </a>
        </div>

        <div class="card">
            <h2>🤖 AI Summary</h2>
            <p>Generate smart summaries.</p>
            <button disabled>Coming Soon</button>
        </div>

        <div class="card">
            <h2>📝 Quiz Generator</h2>
            <p>Create practice questions.</p>
            <button disabled>Coming Soon</button>
        </div>

        <div class="card">
            <h2>💬 AI Chat</h2>
            <p>Ask questions about your notes.</p>
            <button disabled>Coming Soon</button>
        </div>

    </div>

</div>

</body>
</html>
